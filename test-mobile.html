<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mobile Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-image {
            width: 100%;
            height: 200px;
            background: #e0e0e0;
        }
        .test-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .test-content {
            padding: 15px;
        }
        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h2>Test Images Mobile</h2>
    
    <div class="test-card">
        <div class="test-image">
            <img src="images/soupe-oignon.png" alt="Test 1">
        </div>
        <div class="test-content">
            <h3>Soupe à l'oignon</h3>
            <p>Si tu vois cette image, le chemin fonctionne</p>
        </div>
    </div>
    
    <div class="test-card">
        <div class="test-image">
            <img src="images/foie-gras.png" alt="Test 2">
        </div>
        <div class="test-content">
            <h3>Foie gras</h3>
            <p>Si tu vois cette image, le chemin fonctionne</p>
        </div>
    </div>

    <div class="test-card">
        <div class="test-image">
            <img src="images/coq-au-vin.png" alt="Test 3">
        </div>
        <div class="test-content">
            <h3>Coq au vin</h3>
            <p>Si tu vois cette image, le chemin fonctionne</p>
        </div>
    </div>

    <script>
        // Vérifier si les images se chargent
        document.querySelectorAll('img').forEach((img, index) => {
            img.onload = function() {
                console.log(`✅ Image ${index + 1} chargée: ${this.src}`);
            };
            img.onerror = function() {
                console.error(`❌ Image ${index + 1} ERREUR: ${this.src}`);
                this.parentElement.style.background = 'red';
                this.parentElement.innerHTML += '<p style="color:white;padding:20px;">IMAGE NON TROUVÉE</p>';
            };
        });
    </script>
</body>
</html>
